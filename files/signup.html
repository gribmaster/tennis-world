<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: Inter, system-ui, sans-serif; color: #0F0F0F; background: #F5F2EC; margin: 0; }

  /* Typography */
  .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  .eyebrow { font-size: 11px; line-height: 16px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .display-xl { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(36px, 5vw, 72px); line-height: 1.06; font-weight: 300; letter-spacing: -0.02em; }
  .display-l  { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(28px, 3.5vw, 52px); line-height: 1.1; font-weight: 300; letter-spacing: -0.02em; }
  .display-m  { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(22px, 2.5vw, 36px); line-height: 1.2; font-weight: 400; letter-spacing: -0.01em; }
  .headline   { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(18px, 1.8vw, 26px); line-height: 1.3; font-weight: 500; }
  .body-l { font-size: clamp(15px, 1.2vw, 18px); line-height: 1.65; font-weight: 400; }
  .body-m { font-size: clamp(14px, 1vw, 16px); line-height: 1.6; font-weight: 400; }
  .body-s { font-size: 13px; line-height: 1.55; font-weight: 400; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #B8B8B6; border-radius: 2px; }

  /* Animations */
  .fade-in { animation: fadeIn 500ms ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .slide-up { animation: slideUp 350ms cubic-bezier(0.32,0.72,0,1) both; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }

  .pin-pulse { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(185,92,58,.4)} 50%{box-shadow:0 0 0 10px rgba(185,92,58,0)} }

  /* Nav */
  .nav-link { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; color: #6B6B6B; transition: color 150ms; cursor: pointer; }
  .nav-link:hover, .nav-link.active { color: #0F0F0F; }
  .nav-link.active { border-bottom: 1px solid #0F0F0F; padding-bottom: 1px; }

  /* Btn */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border: none; outline: none; transition: opacity 150ms, transform 150ms; font-family: Inter, sans-serif; }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); opacity: 0.82; }
  .btn-primary { background: #0F0F0F; color: #F5F2EC; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .btn-secondary { background: transparent; color: #0F0F0F; border: 1px solid #0F0F0F; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .btn-ghost { background: transparent; color: #0F0F0F; height: 44px; padding: 0 16px; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
  .btn-gold { background: #B89968; color: #0F0F0F; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }

  /* Glass */
  .glass { background: rgba(255,255,255,0.14); backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.24); }

  /* Cards */
  .court-card { cursor: pointer; overflow: hidden; transition: transform 300ms ease; }
  .court-card:hover { transform: translateY(-3px); }
  .court-card img { transition: transform 500ms ease; }
  .court-card:hover img { transform: scale(1.04); }

  /* Pill */
  .pill { border-radius: 999px; }
  .filter-pill { padding: 7px 16px; border: 1px solid #B8B8B6; background: transparent; color: #0F0F0F; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 150ms; }
  .filter-pill.active, .filter-pill:hover { background: #0F0F0F; color: #F5F2EC; border-color: #0F0F0F; }

  /* Map */
  .gmap {
    background:
      /* Water bodies */
      radial-gradient(ellipse 120px 80px at 28% 22%, #c8d4d8 0%, transparent 100%),
      radial-gradient(ellipse 200px 60px at 72% 45%, #c4d0d8 0%, transparent 100%),
      radial-gradient(ellipse 80px 120px at 85% 65%, #cad6dc 0%, transparent 100%),
      /* Land masses */
      radial-gradient(ellipse 180px 140px at 25% 35%, #ddd8c8 0%, #d4ceba 60%, transparent 100%),
      radial-gradient(ellipse 100px 80px at 55% 50%, #d8d2c0 0%, transparent 100%),
      radial-gradient(ellipse 150px 100px at 75% 35%, #dbd5c3 0%, transparent 100%),
      radial-gradient(ellipse 80px 60px at 18% 55%, #d6d0be 0%, transparent 100%),
      /* Base */
      linear-gradient(160deg, #e8e2d0 0%, #ddd7c5 40%, #d8d2c0 100%);
    filter: saturate(0.6) sepia(0.1);
  }

  /* Modal backdrop */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,15,15,0.6); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  @media (min-width: 768px) { .modal-backdrop { align-items: center; } }

  /* Hide scrollbar */
  .no-scroll-bar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scroll-bar::-webkit-scrollbar { display: none; }

  /* Hairline */
  .hairline { background: #E0DCCC; }

  /* Section spacing */
  .section { padding: clamp(48px, 6vw, 96px) 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 clamp(20px, 4vw, 64px); }

  /* Map layout — stacked on mobile, side-by-side on desktop */
  .map-layout {
    display: flex;
    flex-direction: column;
    height: calc(100dvh - 72px - 77px);
  }
  .map-canvas-wrap {
    flex: 0 0 55vh;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .map-list-panel {
    flex: 1 1 auto;
    min-height: 0;
    background: #F5F2EC;
    border-top: 1px solid #E0DCCC;
    overflow-y: hidden;
  }
  /* Mobile: horizontal card strip */
  .map-list-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .map-list-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #E0DCCC;
    flex-shrink: 0;
  }
  .map-cards-scroll {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 16px 20px;
    align-items: flex-start;
  }
  .map-card-mobile {
    flex: 0 0 auto;
    width: 180px;
    cursor: pointer;
  }
  /* Hide desktop rows on mobile, show cards */
  .map-rows { display: none; }
  @media (min-width: 768px) {
    .map-layout {
      flex-direction: row;
      height: calc(100dvh - 72px - 77px);
    }
    .map-canvas-wrap {
      flex: 1 1 auto;
    }
    .map-list-panel {
      flex: 0 0 380px;
      border-top: none;
      border-left: 1px solid #E0DCCC;
      overflow-y: auto;
    }
    .map-cards-scroll { display: none; }
    .map-rows { display: block; overflow-y: auto; flex: 1 1 auto; }
  }

  /* Editor's Cut rows — stack on mobile, side-by-side on desktop */
  .editors-row { display: flex; flex-direction: column; }
  .editors-img { order: 0; }
  .editors-text { order: 1; }
  @media (min-width: 768px) {
    .editors-row { display: grid; grid-template-columns: 1fr 1fr; }
    .editors-img { order: var(--order); }
    .editors-text { order: var(--order); }
  }

  /* Hover link */
  a { text-decoration: none; color: inherit; }

  /* Focus ring */
  button:focus-visible { outline: 2px solid #B95C3A; outline-offset: 2px; }

  /* Image overlay gradient */
  .img-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.72) 100%); }
  .img-overlay-top { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 45%, rgba(15,15,15,0.85) 100%); }

  /* Sticky nav */
  #main-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: background 300ms, box-shadow 300ms; }
  #main-nav.scrolled { background: rgba(245,242,236,0.96); backdrop-filter: blur(20px); box-shadow: 0 1px 0 #E0DCCC; }

  /* Screen panels (SPA) */
  .screen-panel { display: none; }
  .screen-panel.active { display: block; }

  /* Saved heart */
  .heart-btn { width: 36px; height: 36px; border-radius: 999px; background: rgba(0,0,0,0.28); backdrop-filter: blur(8px); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; transition: transform 200ms; }
  .heart-btn.saved { color: #B95C3A; }
  .heart-btn:hover { transform: scale(1.12); }

  /* Tag chips */
  .meta-chip { padding: 5px 12px; border: 1px solid #B8B8B6; background: #FAF8F3; font-size: 13px; border-radius: 2px; }

  /* Locked badge */
  .locked-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; background: rgba(42,42,42,0.85); color: #F5F2EC; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 999px; display: flex; align-items: center; gap: 5px; }

  /* Footer */
  footer { background: #0F0F0F; color: #F5F2EC; }

  /* Auth gate message */
  .gate-blur { filter: blur(8px); pointer-events: none; user-select: none; }
</style>

<script>
(function(){
  var fallbacks=['https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=1200&q=80','https://images.unsplash.com/photo-1622279457486-62dcc4a431d6?w=1200&q=80','https://images.unsplash.com/photo-1530915534234-66dcdb7e2f5d?w=1200&q=80','https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200&q=80','https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1200&q=80'];
  document.addEventListener('error',function(e){var t=e.target;if(t&&t.tagName==='IMG'&&!t.dataset.fb){var n=parseInt(t.dataset.fbn||'0',10);if(n<fallbacks.length){t.dataset.fbn=String(n+1);t.src=fallbacks[n];}else{t.dataset.fb='1';t.style.background='linear-gradient(135deg,#d8d3c5,#b8b3a3)';}}},true);
})();

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const I = {
  search:       p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,

// ─── Sign Up ─────────────────────────────────────────────
function SignUp() {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = e => {
    e.preventDefault();
    if (!email.trim() || !name.trim()) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setSent(true); }, 700);
  };

  return (
    <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column' }}>
      {/* Minimal top bar */}
      <div style={{ padding: '24px clamp(20px,4vw,64px)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="home.html" className="serif" style={{ fontSize: 18, letterSpacing: '0.18em', fontWeight: 400, color: '#0F0F0F' }}>
          TENNIS · WORLD
        </a>
        <a href="home.html" className="eyebrow" style={{ color: '#6B6B6B' }}>Continue exploring</a>
      </div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px clamp(20px,4vw,64px) 64px' }}>
        <div style={{ width: '100%', maxWidth: 400 }} className="fade-in">

          {!sent ? (
            <>
              <div className="eyebrow" style={{ color: '#6B6B6B', textAlign: 'center' }}>Join Tennis World</div>
              <div className="display-l" style={{ textAlign: 'center', marginTop: 12 }}>Create your account</div>
              <p className="body-m" style={{ color: '#6B6B6B', textAlign: 'center', marginTop: 12 }}>
                Save courts, build collections, and unlock the full atlas.
              </p>

              <div style={{ marginTop: 40, display: 'flex', flexDirection: 'column', gap: 10 }}>
                <button className="btn btn-secondary" style={{ width: '100%', justifyContent: 'center', gap: 10 }}>
                  <AuthIcons.apple width="16" height="16" /> Continue with Apple
                </button>
                <button className="btn btn-secondary" style={{ width: '100%', justifyContent: 'center', gap: 10 }}>
                  <AuthIcons.google width="16" height="16" /> Continue with Google
                </button>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '28px 0' }}>
                <div style={{ flex: 1, height: 1, background: '#E0DCCC' }} />
                <span className="eyebrow" style={{ color: '#B8B8B6' }}>or</span>
                <div style={{ flex: 1, height: 1, background: '#E0DCCC' }} />
              </div>

              <form onSubmit={submit}>
                <div style={{ marginBottom: 18 }}>
                  <div className="eyebrow" style={{ color: '#6B6B6B', marginBottom: 8 }}>Name</div>
                  <input
                    type="text" required value={name} onChange={e => setName(e.target.value)}
                    placeholder="Eleanor Morgan" className="body-m"
                    style={{ width: '100%', height: 52, background: '#FAF8F3', border: '1px solid #E0DCCC', outline: 'none', padding: '0 16px', color: '#0F0F0F', fontFamily: 'Inter,sans-serif' }}
                  />
                </div>
                <div>
                  <div className="eyebrow" style={{ color: '#6B6B6B', marginBottom: 8 }}>Email</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: '#FAF8F3', border: '1px solid #E0DCCC', height: 52, padding: '0 16px' }}>
                    <AuthIcons.mail width="16" height="16" style={{ color: '#6B6B6B', flexShrink: 0 }} />
                    <input
                      type="email" required value={email} onChange={e => setEmail(e.target.value)}
                      placeholder="you@example.com" className="body-m"
                      style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: '#0F0F0F', minWidth: 0 }}
                    />
                  </div>
                </div>
                <button type="submit" disabled={loading} className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', marginTop: 22, opacity: loading ? 0.6 : 1 }}>
                  {loading ? 'Creating…' : 'Create Account'} {!loading && <I.arrow width="14" height="14" />}
                </button>
              </form>

              <p className="body-s" style={{ color: '#6B6B6B', textAlign: 'center', marginTop: 28 }}>
                No password needed — we'll email you a secure sign-in link.
              </p>

              <div style={{ textAlign: 'center', marginTop: 36, paddingTop: 28, borderTop: '1px solid #E0DCCC' }}>
                <span className="body-m" style={{ color: '#6B6B6B' }}>Already have an account? </span>
                <a href="signin.html" className="body-m" style={{ color: '#0F0F0F', fontWeight: 500, textDecoration: 'underline' }}>Sign in</a>
              </div>
            </>
          ) : (
            <div style={{ textAlign: 'center' }} className="fade-in">
              <div style={{ width: 64, height: 64, borderRadius: 999, background: '#0F0F0F', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto' }}>
                <AuthIcons.mail width="24" height="24" style={{ color: '#F5F2EC' }} />
              </div>
              <div className="display-m" style={{ marginTop: 24 }}>Confirm your email</div>
              <p className="body-l" style={{ color: '#6B6B6B', marginTop: 12 }}>
                We've sent a confirmation link to<br/><strong style={{ color: '#0F0F0F' }}>{email}</strong>
              </p>
              <button onClick={() => setSent(false)} className="btn btn-ghost" style={{ marginTop: 24, color: '#6B6B6B' }}>
                Use a different email
              </button>
            </div>
          )}

        </div>
      </div>

      <div style={{ textAlign: 'center', padding: '0 24px 32px' }}>
        <span className="body-s" style={{ color: '#B8B8B6' }}>By continuing, you agree to our <a href="terms.html" style={{ color: '#6B6B6B', textDecoration: 'underline' }}>Terms</a> and <a href="privacy.html" style={{ color: '#6B6B6B', textDecoration: 'underline' }}>Privacy Policy</a>.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SignUp />);

</script>
</body>
</html>
