  .nav-link:hover, .nav-link.active { color: #0F0F0F; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border: none; outline: none; transition: opacity 150ms, transform 150ms; font-family: Inter, sans-serif; }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); opacity: 0.82; }
  .btn-primary { background: #0F0F0F; color: #F5F2EC; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .btn-secondary { background: transparent; color: #0F0F0F; border: 1px solid #0F0F0F; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .btn-ghost { background: transparent; color: #0F0F0F; height: 44px; padding: 0 16px; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
  .btn-gold { background: #B89968; color: #0F0F0F; height: 52px; padding: 0 28px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }

  /* Glass */
  .glass { background: rgba(255,255,255,0.14); backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.24); }

  /* Cards */
  .court-card { cursor: pointer; overflow: hidden; transition: transform 300ms ease; }
  .court-card:hover { transform: translateY(-3px); }

  .court-card:hover img { transform: scale(1.04); }

  /* Pill */
  .pill { border-radius: 999px; }
  .filter-pill { padding: 7px 16px; border: 1px solid #B8B8B6; background: transparent; color: #0F0F0F; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 150ms; }

  /* Map */
  .gmap {
    background:
      /* Water bodies */
      radial-gradient(ellipse 120px 80px at 28% 22%, #c8d4d8 0%, transparent 100%),
      radial-gradient(ellipse 200px 60px at 72% 45%, #c4d0d8 0%, transparent 100%),
      radial-gradient(ellipse 80px 120px at 85% 65%, #cad6dc 0%, transparent 100%),
      /* Land masses */
      radial-gradient(ellipse 180px 140px at 25% 35%, #ddd8c8 0%, #d4ceba 60%, transparent 100%),
      radial-gradient(ellipse 100px 80px at 55% 50%, #d8d2c0 0%, transparent 100%),
      radial-gradient(ellipse 150px 100px at 75% 35%, #dbd5c3 0%, transparent 100%),
      radial-gradient(ellipse 80px 60px at 18% 55%, #d6d0be 0%, transparent 100%),
      /* Base */
      linear-gradient(160deg, #e8e2d0 0%, #ddd7c5 40%, #d8d2c0 100%);
    filter: saturate(0.6) sepia(0.1);

  /* Modal backdrop */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,15,15,0.6); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }

  /* Hairline */
  .hairline { background: #E0DCCC; }

  /* Section spacing */
  .section { padding: clamp(48px, 6vw, 96px) 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 clamp(20px, 4vw, 64px); }

  /* Map layout — stacked on mobile, side-by-side on desktop */
  .map-layout {
    display: flex;
    flex-direction: column;
    height: calc(100dvh - 72px - 77px);
  }
  .map-canvas-wrap {
    flex: 0 0 55vh;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .map-list-panel {
    flex: 1 1 auto;
    min-height: 0;
    background: #F5F2EC;
    border-top: 1px solid #E0DCCC;
    overflow-y: hidden;
  }
  /* Mobile: horizontal card strip */
  .map-list-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .map-list-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #E0DCCC;
    flex-shrink: 0;
  }
  .map-cards-scroll {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 16px 20px;
    align-items: flex-start;
  }
  .map-card-mobile {
    flex: 0 0 auto;
    width: 180px;
    cursor: pointer;
  }
  /* Hide desktop rows on mobile, show cards */
  .map-rows { display: none; }
  @media (min-width: 768px) {
    .map-layout {
      flex-direction: row;
      height: calc(100dvh - 72px - 77px);
    }
    .map-canvas-wrap {
      flex: 1 1 auto;
    }
    .map-list-panel {
      flex: 0 0 380px;
      border-top: none;
      border-left: 1px solid #E0DCCC;
      overflow-y: auto;
    }
    .map-cards-scroll { display: none; }
    .map-rows { display: block; overflow-y: auto; flex: 1 1 auto; }
  }

  /* Editor's Cut rows — stack on mobile, side-by-side on desktop */
  .editors-row { display: flex; flex-direction: column; }
  .editors-img { order: 0; }
  .editors-text { order: 1; }
  @media (min-width: 768px) {
    .editors-row { display: grid; grid-template-columns: 1fr 1fr; }
    .editors-img { order: var(--order); }
    .editors-text { order: var(--order); }
  }

  /* Hover link */
  a { text-decoration: none; color: inherit; }

  /* Focus ring */
  button:focus-visible { outline: 2px solid #B95C3A; outline-offset: 2px; }

  /* Image overlay gradient */
  .img-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.72) 100%); }
  .img-overlay-top { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 45%, rgba(15,15,15,0.85) 100%); }

  #main-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: background 300ms, box-shadow 300ms; }

  .screen-panel.active { display: block; }

  .heart-btn { width: 36px; height: 36px; border-radius: 999px; background: rgba(0,0,0,0.28); backdrop-filter: blur(8px); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; transition: transform 200ms; }

  .meta-chip { padding: 5px 12px; border: 1px solid #B8B8B6; background: #FAF8F3; font-size: 13px; border-radius: 2px; }

  .locked-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; background: rgba(42,42,42,0.85); color: #F5F2EC; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 999px; display: flex; align-items: center; gap: 5px; }

  /* Footer */
  footer { background: #0F0F0F; color: #F5F2EC; }

  /* Auth gate message */
  .gate-blur { filter: blur(8px); pointer-events: none; user-select: none; }
</style>

  menu:         p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><path d="M3 6h18M3 12h18M3 18h18"/></svg>,
  map:          p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><path d="m9 4-6 2v14l6-2 6 2 6-2V4l-6 2-6-2zM9 4v14M15 6v14"/></svg>,
  bookmark:     p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><path d="M6 4h12v17l-6-4-6 4z"/></svg>,
  bookmarkFill: p=><svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M6 4h12v17l-6-4-6 4z"/></svg>,
  play:         p=><svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M7 5v14l12-7z"/></svg>,
  globe:        p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2c-3 4-3 12 0 20M12 2c3 4 3 12 0 20"/></svg>,
  user:         p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 5-6 8-6s7 2 8 6"/></svg>,

};

// ─── Nav ────────────────────────────────────────────────
function Nav({ page, setPage, savedCount, unlocked, isLoggedIn, onPaywall, mobileMenuOpen, setMobileMenu }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const isHeroPage = page === 'home';
  const navOver = isHeroPage && !scrolled;

  return (
    <nav id="main-nav" style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(245,242,236,0.96)' : (isHeroPage ? 'transparent' : 'rgba(245,242,236,0.96)'),
      backdropFilter: scrolled || !isHeroPage ? 'blur(20px)' : 'none',
      boxShadow: scrolled || !isHeroPage ? '0 1px 0 #E0DCCC' : 'none',
      transition: 'all 300ms ease',
    }}>
      <div className="container" style={{ height: 72, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32 }}>
        {/* Logo */}
        <button onClick={() => setPage('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
          <div className="serif" style={{ fontSize: 18, letterSpacing: '0.18em', fontWeight: 400, color: navOver ? '#F5F2EC' : '#0F0F0F' }}>
            TENNIS · WORLD
          </div>
        </button>

        {/* Desktop nav */}
        <div className="hidden md:flex items-center gap-8">
          {[['home','Home'],['map','Map'],['collections','Collections'],['journal','Journal']].map(([id,label]) => (
            <button key={id} onClick={() => setPage(id)} className="nav-link btn" style={{
              color: navOver ? 'rgba(245,242,236,0.85)' : (page === id ? '#0F0F0F' : '#6B6B6B'),
              borderBottom: page === id && !navOver ? '1px solid currentColor' : 'none',
              paddingBottom: page === id && !navOver ? 1 : 0,
              height: 'auto', padding: '0',
            }}>{label}</button>
          ))}
        </div>

        {/* Right side */}
        <div className="hidden md:flex items-center gap-4">
          <button onClick={() => setPage('saved')} style={{ position: 'relative', background: 'none', border: 'none', cursor: 'pointer', color: navOver ? 'rgba(245,242,236,0.85)' : '#6B6B6B', padding: 8 }}>
            <I.bookmark width="18" height="18" />
            {savedCount > 0 && <div style={{ position: 'absolute', top: 4, right: 4, width: 8, height: 8, borderRadius: 999, background: '#B95C3A' }} />}
          </button>
          <button onClick={() => window.location.href = isLoggedIn ? 'profile.html' : 'signin.html'} style={{ background: 'none', border: 'none', cursor: 'pointer', color: navOver ? 'rgba(245,242,236,0.85)' : '#6B6B6B', padding: 8 }}>
            <I.user width="18" height="18" />
          </button>
          {!unlocked && (
            <button onClick={onPaywall} className="btn btn-primary" style={{ height: 40, padding: '0 20px', fontSize: 11, letterSpacing: '0.1em', background: navOver ? 'rgba(245,242,236,0.16)' : '#0F0F0F', border: navOver ? '1px solid rgba(245,242,236,0.5)' : 'none', color: navOver ? '#F5F2EC' : '#F5F2EC' }}>
              Unlock Map
            </button>
          )}
        </div>

        {/* Mobile hamburger */}
        <button className="md:hidden" onClick={() => setMobileMenu(!mobileMenuOpen)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: navOver ? '#F5F2EC' : '#0F0F0F', padding: 8 }}>
          <I.menu width="22" height="22" />
        </button>
      </div>

      {/* Mobile dropdown */}
      {mobileMenuOpen && (
        <div style={{ background: '#F5F2EC', borderTop: '1px solid #E0DCCC', padding: '16px 24px 24px' }}>
          {[['home','Home'],['map','Map'],['collections','Collections'],['journal','Journal'],['saved','Saved']].map(([id,label]) => (
            <button key={id} onClick={() => { setPage(id); setMobileMenu(false); }} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '14px 0', borderBottom: '1px solid #E0DCCC', background: 'none', border: 'none', borderBottom: '1px solid #E7E2D4', cursor: 'pointer', color: '#0F0F0F' }} className="body-l">{label}</button>
          ))}
          <button onClick={() => { window.location.href = isLoggedIn ? 'profile.html' : 'signin.html'; setMobileMenu(false); }} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '14px 0', background: 'none', border: 'none', borderBottom: '1px solid #E7E2D4', cursor: 'pointer', color: '#0F0F0F' }} className="body-l">{isLoggedIn ? 'Profile' : 'Sign In'}</button>
          {!unlocked && <button onClick={() => { onPaywall(); setMobileMenu(false); }} className="btn btn-primary" style={{ marginTop: 20, width: '100%', justifyContent: 'center' }}>Unlock Full Access — $29</button>}

    </nav>
  );

// ─── Create Collection modal ────────────────────────────
function CreateCollectionModal({ onClose, onCreate }) {

          </button>
        </div>
        <p className="body-m" style={{ color: '#6B6B6B', marginTop: 8 }}>Give your collection a name. You can add courts to it anytime.</p>

          <div className="eyebrow" style={{ color: '#6B6B6B', marginBottom: 8 }}>Collection name</div>

            placeholder="Summer in Italy" className="body-m"
            style={{ width: '100%', height: 52, background: '#FAF8F3', border: '1px solid #E0DCCC', outline: 'none', padding: '0 16px', color: '#0F0F0F', fontFamily: 'Inter,sans-serif' }}

        >
          Create Collection <I.arrow width="14" height="14" />
        </button>

// ─── Save to Collection dropdown ─────────────────────────
function SaveToCollectionMenu({ court, collections, onToggleCourtInCollection, onRequestCreate }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} className="btn" style={{ background: 'none', border: '1px solid #E0DCCC', height: 36, padding: '0 14px', display: 'flex', alignItems: 'center', gap: 6, color: '#6B6B6B', fontSize: 12 }}>
        <I.bookmark width="14" height="14" /> Add to Collection
      </button>
      {open && (
        <div className="fade-in" style={{ position: 'absolute', top: 'calc(100% + 8px)', right: 0, width: 260, background: '#FFFFFF', border: '1px solid #E0DCCC', boxShadow: '0 8px 24px rgba(0,0,0,0.12)', zIndex: 60, padding: 8 }}>
          {collections.length === 0 && (
            <div className="body-s" style={{ color: '#6B6B6B', padding: '12px 10px' }}>No collections yet.</div>
          )}
          {collections.map(col => {
            const inCollection = col.courtIds.includes(court.id);
            return (
              <button
                key={col.id}
                onClick={() => onToggleCourtInCollection(col.id, court.id)}
                style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '10px 10px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left' }}
                onMouseEnter={e => { e.currentTarget.style.background = '#FAF8F3'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
              >
                <span className="body-m">{col.name}</span>
                {inCollection
                  ? <span style={{ width: 18, height: 18, borderRadius: 4, background: '#0F0F0F', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><I.arrow width="0" height="0" style={{ display: 'none' }} /><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#F5F2EC" strokeWidth="2.5"><path d="M5 13l4 4L19 7"/></svg></span>
                  : <span style={{ width: 18, height: 18, borderRadius: 4, border: '1px solid #B8B8B6', flexShrink: 0 }} />
                }
              </button>
            );
          })}
          <div style={{ borderTop: '1px solid #E0DCCC', marginTop: 6, paddingTop: 6 }}>
            <button
              onClick={() => { setOpen(false); onRequestCreate(); }}
              style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', padding: '10px 10px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', color: '#0F0F0F' }}
              onMouseEnter={e => { e.currentTarget.style.background = '#FAF8F3'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
            >
              <I.plus width="14" height="14" />
              <span className="body-m">New collection</span>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Consultation modal ────────────────────────────────────

        <div style={{ position:'relative', height:280 }}>

          <div style={{ position:'absolute', inset:0, background:'rgba(15,15,15,0.6)' }} />
        </div>
        <div style={{ padding:'40px 32px 48px', textAlign:'center', color:'#F5F2EC' }}>
          <div className="eyebrow" style={{ color:'rgba(245,242,236,0.6)' }}>Received</div>
          <div className="display-m" style={{ color:'#F5F2EC', marginTop:12 }}>We'll be in touch soon.</div>
          <p className="body-l" style={{ color:'rgba(245,242,236,0.75)', marginTop:12, maxWidth:320, margin:'12px auto 0' }}>A member of our team will reach out within 24 hours.</p>
          <button onClick={onClose} className="btn" style={{ marginTop:28, border:'1px solid rgba(245,242,236,0.4)', color:'#F5F2EC', background:'none', height:48, padding:'0 24px', fontSize:12, letterSpacing:'0.08em', textTransform:'uppercase' }}>Return to Exploring</button>

  return (
    <div className="modal-backdrop" onClick={onClose}>

        <div style={{ padding:'28px 28px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div className="display-m">A bespoke recommendation.</div>
            <p className="body-m" style={{ color:'#6B6B6B', marginTop:8, maxWidth:360 }}>Tell us about the trip you're dreaming of. We respond within 24 hours.</p>
          </div>
          <button onClick={onClose} className="btn" style={{ background:'none', border:'none', padding:8, cursor:'pointer', color:'#6B6B6B', flexShrink:0 }}><I.close width="20" height="20"/></button>

        <div style={{ padding:'28px 28px 0' }}>
          <Field><FieldLabel>Email</FieldLabel><Input ph="you@example.com" val="eleanor@morgan.co" /></Field>

          <Field>

// ─── Collections ──────────────────────────────────────────
function Collections({ onOpenCourt, savedSet, toggleSave }) {
  const [active, setActive] = useState(null);
  const courts = active ? COURTS.filter(c => {
    if (active === 'coastal') return c.setting === 'Lakefront' || c.setting === 'Cliffside' || c.setting === 'Coastal' || c.setting === 'Island';
    if (active === 'mountain') return c.setting === 'Alpine' || c.setting === 'Mountain village';
    if (active === 'hidden') return c.locked;
    if (active === 'historic') return c.access === 'Club';
    if (active === 'rooftop') return c.setting === 'Rooftop';
    return COURTS;
  }) : COURTS;

  return (
    <div style={{ paddingTop: 72 }}>
      <div style={{ background: '#0F0F0F', position: 'relative', overflow: 'hidden' }}>
        <img src={U(IMG.courtAerial, 1800)} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.35 }} />
        <div style={{ position: 'relative', padding: 'clamp(48px,8vw,96px) clamp(24px,6vw,80px)', maxWidth: 1280, margin: '0 auto' }}>
          <div className="eyebrow" style={{ color: 'rgba(245,242,236,0.6)' }}>Collections</div>
          <div className="display-l" style={{ color: '#F5F2EC', marginTop: 12, maxWidth: 480 }}>Curated journeys, gathered by landscape and spirit.</div>
        </div>
      </div>

      <div className="section" style={{ background: '#F5F2EC' }}>
        <div className="container">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 20, marginBottom: 64 }}>
            {COLLECTIONS.map(col => (
              <div key={col.id} onClick={() => setActive(active === col.id ? null : col.id)} className="court-card" style={{ position: 'relative', aspectRatio: '3/2', overflow: 'hidden', outline: active === col.id ? '2px solid #0F0F0F' : 'none', outlineOffset: 2 }}>
                <img src={col.img} alt={col.name} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                <div className="img-overlay" />
                <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: 20 }}>
                  <div className="serif" style={{ color: '#fff', fontSize: 'clamp(18px,1.6vw,24px)', fontWeight: 500 }}>{col.name}</div>
                  <div className="eyebrow" style={{ color: 'rgba(255,255,255,0.7)', marginTop: 5 }}>{col.count} courts</div>
                </div>
                {active === col.id && <div style={{ position: 'absolute', top: 12, right: 12, background: '#0F0F0F', color: '#F5F2EC', padding: '4px 10px', fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase' }}>Selected</div>}
              </div>
            ))}
          </div>

          <SH eyebrow={active ? COLLECTIONS.find(c=>c.id===active)?.name : 'All Courts'} title={active ? `${courts.length} curated places` : 'Explore the full atlas'} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 24 }}>
            {courts.map(c => (
              <CourtCard key={c.id} court={c} onOpen={onOpenCourt} onSave={toggleSave} saved={savedSet.has(c.id)} />
            ))}
          </div>
        </div>
      </div>

      <Footer />
    </div>
  );
}



// ─── Page App ───────────────────────────────────────────
function App() {
  const [paywall,    setPaywall]    = useState(false);
  const [consult,    setConsult]    = useState(false);
  const [unlocked,   setUnlocked]   = useState(false);
  const [savedSet,   setSaved]      = useState(new Set(['tremezzo','residencia','soho']));
  const [mobileMenu, setMobileMenu] = useState(false);
  const [isLoggedIn] = useState(false); // demo state — wire to real auth/session
  const [openCourt,  setOpenCourt]  = useState(null);
  const [userCollections, setUserCollections] = useState(USER_COLLECTIONS);
  const [createCollectionOpen, setCreateCollectionOpen] = useState(false);

  const toggleSave = id => setSaved(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  });
  const navigate = href => { window.location.href = href; };

  const toggleCourtInCollection = (collectionId, courtId) => {
    setUserCollections(prev => prev.map(col => {
      if (col.id !== collectionId) return col;
      const has = col.courtIds.includes(courtId);
      return { ...col, courtIds: has ? col.courtIds.filter(id => id !== courtId) : [...col.courtIds, courtId] };
    }));
  };
  const createCollection = name => {
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || `collection-${Date.now()}`;
    setUserCollections(prev => [...prev, { id, name, courtIds: openCourt ? [openCourt.id] : [] }]);
    setCreateCollectionOpen(false);
  };

  return (
    <>
      <Nav
        page="collections"
        setPage={p => navigate(p + '.html')}
        savedCount={savedSet.size}
        unlocked={unlocked}
        isLoggedIn={isLoggedIn}
        onPaywall={() => setPaywall(true)}
        mobileMenuOpen={mobileMenu}
        setMobileMenu={setMobileMenu}
      />
      {openCourt
        ? <CourtDetail
            court={openCourt}
            onBack={() => setOpenCourt(null)}
            onPaywall={() => setPaywall(true)}
            onConsult={() => setConsult(true)}
            savedSet={savedSet}
            toggleSave={toggleSave}
            unlocked={unlocked}
            collections={userCollections}
            onToggleCourtInCollection={toggleCourtInCollection}
            onRequestCreateCollection={() => setCreateCollectionOpen(true)}
          />
        : <Collections onOpenCourt={c => setOpenCourt(c)} savedSet={savedSet} toggleSave={toggleSave} />
      }
      {paywall && <Paywall onClose={() => setPaywall(false)} onUnlock={() => { setUnlocked(true); setPaywall(false); }} />}
      {consult && <Consult onClose={() => setConsult(false)} />}
      {createCollectionOpen && <CreateCollectionModal onClose={() => setCreateCollectionOpen(false)} onCreate={createCollection} />}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
